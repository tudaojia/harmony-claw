<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HarmonyClaw Setup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    
    .logo {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    
    .subtitle {
      color: #888;
      margin-bottom: 40px;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    
    .feature {
      display: flex;
      align-items: center;
      text-align: left;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .feature:last-child {
      border-bottom: none;
    }
    
    .feature-icon {
      font-size: 24px;
      margin-right: 16px;
    }
    
    .feature-text h3 {
      font-size: 16px;
      margin-bottom: 4px;
    }
    
    .feature-text p {
      font-size: 12px;
      color: #888;
    }
    
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #2196F3;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .btn:hover {
      background: #1976D2;
    }
    
    .btn:disabled {
      background: #666;
      cursor: not-allowed;
    }
    
    .progress {
      margin-top: 20px;
    }
    
    .progress-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: #4CAF50;
      transition: width 0.3s;
    }
    
    .progress-text {
      margin-top: 8px;
      font-size: 14px;
      color: #888;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🧠</div>
    <h1>HarmonyClaw</h1>
    <p class="subtitle">OpenClaw for HarmonyOS</p>
    
    <div id="setup-card" class="card">
      <div class="feature">
        <span class="feature-icon">🖥️</span>
        <div class="feature-text">
          <h3>终端模拟器</h3>
          <p>完整的终端体验</p>
        </div>
      </div>
      <div class="feature">
        <span class="feature-icon">📦</span>
        <div class="feature-text">
          <h3>开发环境</h3>
          <p>Termux bootstrap 支持</p>
        </div>
      </div>
      <div class="feature">
        <span class="feature-icon">🤖</span>
        <div class="feature-text">
          <h3>AI Agent</h3>
          <p>OpenClaw 平台集成</p>
        </div>
      </div>
    </div>
    
    <button id="start-btn" class="btn" onclick="startSetup()">
      开始安装
    </button>
    
    <div id="progress" class="progress hidden">
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
      </div>
      <p id="progress-text" class="progress-text">准备中...</p>
    </div>
  </div>
  
  <script>
    // 事件系统
    window.__oc = {
      emit: function(type, data) {
        console.log('Event:', type, data);
        
        if (type === 'setup_progress') {
          updateProgress(data.progress, data.message);
        }
      }
    };
    
    // 开始安装
    function startSetup() {
      const btn = document.getElementById('start-btn');
      const progress = document.getElementById('progress');
      
      btn.classList.add('hidden');
      progress.classList.remove('hidden');
      
      if (window.OpenClaw) {
        OpenClaw.startSetup();
      } else {
        // 模拟进度
        simulateProgress();
      }
    }
    
    // 更新进度
    function updateProgress(progress, message) {
      const fill = document.getElementById('progress-fill');
      const text = document.getElementById('progress-text');
      
      fill.style.width = (progress * 100) + '%';
      text.textContent = message;
      
      if (progress >= 1) {
        setTimeout(() => {
          if (window.OpenClaw) {
            OpenClaw.showTerminal();
          }
        }, 1000);
      }
    }
    
    // 模拟进度（用于测试）
    function simulateProgress() {
      let p = 0;
      const messages = [
        '准备中...', '下载资源...', '解压文件...', 
        '配置环境...', '完成!'
      ];
      
      const interval = setInterval(() => {
        p += 0.2;
        updateProgress(p, messages[Math.floor(p * 5)] || '完成!');
        
        if (p >= 1) {
          clearInterval(interval);
        }
      }, 500);
    }
    
    // 检查安装状态
    function checkStatus() {
      if (window.OpenClaw) {
        const status = JSON.parse(OpenClaw.getSetupStatus());
        if (status.bootstrapInstalled) {
          OpenClaw.showTerminal();
        }
      }
    }
    
    // 页面加载完成后检查
    setTimeout(checkStatus, 500);
  </script>
</body>
</html>
